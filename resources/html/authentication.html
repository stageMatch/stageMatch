<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>stageMatch - Autenticazione</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/authentication.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="slider-container" id="sliderContainer">

                <!-- Pannello Login -->
                <div class="auth-panel login-panel active" id="loginPanel">
                    <div class="panel-header">
                        <h2>Bentornato!</h2>
                        <p>Accedi al tuo account per continuare</p>
                    </div>

                    <div class="google-only-login">
                        <p class="google-hint">Utilizza il tuo account Google per accedere a stageMatch.</p>
                        <button type="button" class="btn-google-main" id="loginGoogleBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Accedi con Google
                        </button>
                    </div>

                    <div class="switch-panel">
                        <p>Non hai un account? <a href="#" class="switch-link" data-target="register">Registrati</a></p>
                    </div>
                </div>

                <!-- Pannello Registrazione -->
                <div class="auth-panel register-panel" id="registerPanel">
                    <div class="panel-header">
                        <h2>Crea un account</h2>
                        <p>Inizia il tuo viaggio con stageMatch</p>
                    </div>

                    <form class="auth-form" id="registerForm">

                        <!-- Nome azienda -->
                        <div class="field-group">
                            <label for="register-name">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
                                </svg>
                                Nome azienda
                            </label>
                            <input type="text" id="register-name" class="form-input" placeholder="Es. Rossi S.r.l." required>
                        </div>

                        <!-- Codice di accesso -->
                        <div class="field-group">
                            <label for="register-access-code">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                    <line x1="12" y1="15" x2="12" y2="17"></line>
                                </svg>
                                Codice di accesso
                            </label>
                            <input type="text" id="register-access-code" class="form-input"
                                placeholder="Inserisci il codice fornito dalla scuola" required autocomplete="off" spellcheck="false">
                        </div>

                        <!-- Indirizzo -->
                        <div class="field-group">
                            <label>
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                Indirizzo
                            </label>
                            <div class="address-grid">
                                <div class="address-via">
                                    <input type="text" id="register-via" class="form-input" placeholder="Via / Corso / Piazza" required>
                                </div>
                                <div class="address-cap-civico">
                                    <input type="text" id="register-cap" class="form-input" placeholder="CAP" required pattern="\d{5}" maxlength="5" inputmode="numeric">
                                    <input type="text" id="register-civico" class="form-input" placeholder="N° civico" required>
                                </div>
                                <div class="address-citta">
                                    <div class="autocomplete-wrap">
                                        <input type="text" id="register-citta" class="form-input" placeholder="Città" required autocomplete="off">
                                        <ul class="autocomplete-list" id="register-citta-list" role="listbox"></ul>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Termini -->
                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="accept-terms" required>
                                <span class="checkmark"></span>
                                Accetto i <a href="#" class="terms-link">Termini e Condizioni</a>
                            </label>
                        </div>

                        <!-- Submit Google -->
                        <button type="submit" class="btn-google-main btn-google-register">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Registrati con Google
                        </button>

                    </form>

                    <div class="switch-panel">
                        <p>Hai già un account? <a href="#" class="switch-link" data-target="login">Accedi</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Link alla homepage -->
    <div class="back-home">
        <a href="/">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Indietro
        </a>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/authentication.js') }}"></script>
</body>
</html>
