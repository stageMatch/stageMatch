<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stageMatch - Login</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">

    <!-- Mobile Icons -->
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/apple-touch-icon.svg') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="stageMatch">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-student.css') }}" />
</head>
<body>
    <div class="overlay"></div>
    <div class="noise"></div>

    <main class="hero">
        <div class="hero_content">
            <div class="hero_label">Bergamo</div>
            <div class="hero_logo">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="stageMatch Logo" class="logo-img">
            </div>
            <p class="hero_sub">Trova il tuo stage ideale</p>
            <div class="login-actions">
                <button class="btn-login" id="loginBtn">Accedi con Google</button>
                <a href="{{ url_for('mainPage') }}" class="btn-back">Torna alla Home</a>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/login-student.js') }}"></script>
</body>
</html>
