services:
  web:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - API_URL=http://api:5001
      - DB_CONNECTION_STRING=/app/database_files/users.db
    depends_on:
      - api
    volumes:
      - .:/app
      - db_data:/app/database_files

  api:
    build: .
    command: python server.py
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT_API=5001
    volumes:
      - .:/app

volumes:
  db_data:
